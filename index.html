<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DZ Music Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .spotify-green {
            color: #1DB954;
        }

        .bg-spotify {
            background-color: #1DB954;
        }

        input::placeholder {
            color: #71717a;
        }

        /* Cacher la scrollbar */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="flex flex-col h-screen overflow-hidden">

    <header class="p-6 bg-gradient-to-b from-zinc-800 to-black">
        <h1 class="text-3xl font-bold mb-6">Rechercher</h1>
        <div class="relative">
            <i class="fa fa-search absolute left-4 top-3.5 text-gray-400"></i>
            <input type="text" id="search" placeholder="Artistes, titres ou albums"
                class="w-full bg-white text-black py-3 pl-12 pr-4 rounded-full font-medium focus:outline-none">
        </div>
    </header>

    <main id="results" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 sm:grid-cols-3 gap-4 pb-40">
        <div class="text-gray-500 col-span-full text-center mt-20">
            <i class="fa fa-music text-4xl mb-4 block"></i>
            Cherchez votre musique préférée...
        </div>
    </main>

    <div class="fixed bottom-16 left-0 right-0 p-2">
        <div class="glass rounded-xl p-3 flex flex-col shadow-2xl">
            <div class="flex items-center">
                <img id="current-cover" src="https://via.placeholder.com/150"
                    class="w-12 h-12 rounded-md mr-4 object-cover shadow-lg">
                <div class="flex-1 truncate">
                    <div id="current-title" class="font-bold text-sm truncate uppercase tracking-tight">Aucun titre
                    </div>
                    <div id="current-artist" class="text-xs text-gray-400 truncate">Sélectionnez un morceau</div>
                </div>
                <button id="play-btn" class="text-3xl px-4 focus:outline-none transform active:scale-90 transition">
                    <i class="fa fa-play-circle"></i>
                </button>
            </div>
            <div class="w-full bg-zinc-700 h-1 mt-3 rounded-full overflow-hidden">
                <div id="progress-bar" class="bg-white h-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 w-full bg-black py-3 border-t border-zinc-900 flex justify-around text-gray-400">
        <button class="flex flex-col items-center spotify-green"><i class="fa fa-home text-xl"></i><span
                class="text-[10px] mt-1">Accueil</span></button>
        <button class="flex flex-col items-center"><i class="fa fa-compass text-xl"></i><span
                class="text-[10px] mt-1">Découvrir</span></button>
        <button class="flex flex-col items-center"><i class="fa fa-book-open text-xl"></i><span
                class="text-[10px] mt-1">Bibliothèque</span></button>
    </nav>

    <script>
        const searchInput = document.getElementById('search');
        const resultsContainer = document.getElementById('results');
        const playBtn = document.getElementById('play-btn');
        const currentCover = document.getElementById('current-cover');
        const currentTitle = document.getElementById('current-title');
        const currentArtist = document.getElementById('current-artist');
        const progressBar = document.getElementById('progress-bar');

        let audio = new Audio();
        let isPlaying = false;

        // 1. Recherche via Piped API (Plus stable pour le complet)
        searchInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value.trim();
                if (!query) return;

                resultsContainer.innerHTML = '<div class="col-span-full text-center mt-10 animate-pulse text-green-500">Recherche de morceaux complets...</div>';

                try {
                    const response = await fetch(`https://pipedapi.kavin.rocks/search?q=${encodeURIComponent(query)}&filter=music_songs`);
                    const data = await response.json();

                    if (data.items && data.items.length > 0) {
                        displayResults(data.items);
                    } else {
                        resultsContainer.innerHTML = '<div class="col-span-full text-center mt-10 text-gray-400">Aucun résultat.</div>';
                    }
                } catch (err) {
                    resultsContainer.innerHTML = '<div class="col-span-full text-center mt-10 text-red-500">Erreur réseau. Réessaye.</div>';
                }
            }
        });

        // 2. Affichage
        function displayResults(tracks) {
            resultsContainer.innerHTML = '';
            tracks.forEach(track => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900/50 p-3 rounded-xl hover:bg-zinc-800 transition cursor-pointer group";

                card.innerHTML = `
                <div class="relative overflow-hidden rounded-lg mb-3">
                    <img src="${track.thumbnail}" class="w-full aspect-square object-cover">
                    <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition">
                        <i class="fa fa-play text-white text-3xl"></i>
                    </div>
                </div>
                <div class="font-bold text-sm truncate">${track.title}</div>
                <div class="text-xs text-zinc-500 truncate">${track.uploaderName}</div>
            `;

                card.onclick = () => playTrack(track);
                resultsContainer.appendChild(card);
            });
        }

        // 3. Lecture Audio
        async function playTrack(track) {
            try {
                // On récupère le lien stream réel
                const res = await fetch(`https://pipedapi.kavin.rocks/streams/${track.url.split('=')[1]}`);
                const streamData = await res.json();

                // On prend le flux audio uniquement (m4a)
                const audioStream = streamData.audioStreams.find(s => s.format === 'M4A') || streamData.audioStreams[0];

                audio.src = audioStream.url;
                audio.play();
                isPlaying = true;

                playBtn.innerHTML = '<i class="fa fa-pause-circle"></i>';
                currentCover.src = track.thumbnail;
                currentTitle.innerText = track.title;
                currentArtist.innerText = track.uploaderName;

                audio.ontimeupdate = () => {
                    const progress = (audio.currentTime / audio.duration) * 100;
                    progressBar.style.width = `${progress}%`;
                };
            } catch (e) {
                alert("Erreur lors de la lecture du flux.");
            }
        }

        playBtn.onclick = () => {
            if (isPlaying) { audio.pause(); playBtn.innerHTML = '<i class="fa fa-play-circle"></i>'; }
            else { audio.play(); playBtn.innerHTML = '<i class="fa fa-pause-circle"></i>'; }
            isPlaying = !isPlaying;
        };
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DZ Music Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            color: white;
            font-family: sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .active-tab {
            color: #1DB954;
        }

        /* Vert Spotify */
    </style>
</head>

<body class="flex flex-col h-screen overflow-hidden">

    <header class="p-4">
        <h1 class="text-2xl font-bold mb-4">Rechercher</h1>
        <div class="relative">
            <i class="fa fa-search absolute left-3 top-3 text-gray-400"></i>
            <input type="text" id="search" placeholder="Artistes, titres..."
                class="w-full bg-zinc-800 py-2 pl-10 pr-4 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
        </div>
    </header>

    <main id="results" class="flex-1 overflow-y-auto p-4 grid grid-cols-2 gap-4 pb-32">
        <div class="text-gray-500 col-span-2 text-center mt-10">Cherchez votre musique préférée...</div>
    </main>

    <div
        class="fixed bottom-16 left-2 right-2 glass rounded-xl p-2 flex items-center shadow-2xl border border-white/10">
        <img id="current-cover" src="https://via.placeholder.com/50" class="w-12 h-12 rounded-lg mr-3 object-cover">
        <div class="flex-1 truncate">
            <div id="current-title" class="font-bold text-sm truncate">Aucun titre</div>
            <div id="current-artist" class="text-xs text-gray-400 truncate">Sélectionnez une musique</div>
        </div>
        <button id="play-btn" class="text-2xl mx-4"><i class="fa fa-play"></i></button>
    </div>

    <nav class="fixed bottom-0 w-full bg-black border-t border-zinc-800 flex justify-around p-3 text-gray-400">
        <div class="flex flex-col items-center active-tab"><i class="fa fa-home text-xl"></i><span
                class="text-[10px]">Accueil</span></div>
        <div class="flex flex-col items-center"><i class="fa fa-search text-xl"></i><span
                class="text-[10px]">Rechercher</span></div>
        <div class="flex flex-col items-center"><i class="fa fa-layer-group text-xl"></i><span
                class="text-[10px]">Bibliothèque</span></div>
    </nav>

    <script>
        const searchInput = document.getElementById('search');
        const resultsContainer = document.getElementById('results');
        const playBtn = document.getElementById('play-btn');
        const currentCover = document.getElementById('current-cover');
        const currentTitle = document.getElementById('current-title');
        const currentArtist = document.getElementById('current-artist');

        let audio = new Audio(); // Notre lecteur invisible
        let isPlaying = false;

        // 1. Fonction de recherche
        searchInput.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                if (!query) return;

                resultsContainer.innerHTML = '<div class="col-span-2 text-center">Chargement...</div>';

                try {
                    // Utilisation du proxy CORS Heroku ou autre pour éviter les blocages sur navigateur
                    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(`https://api.deezer.com/search?q=${query}`)}`);
                    const data = await response.json();
                    const tracks = JSON.parse(data.contents).data;

                    displayResults(tracks);
                } catch (err) {
                    resultsContainer.innerHTML = '<div class="col-span-2 text-center text-red-500">Erreur de connexion</div>';
                }
            }
        });

        // 2. Affichage des morceaux
        function displayResults(tracks) {
            resultsContainer.innerHTML = '';
            tracks.forEach(track => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 p-3 rounded-xl active:scale-95 transition-transform cursor-pointer";
                card.innerHTML = `
            <img src="${track.album.cover_medium}" class="w-full aspect-square object-cover rounded-lg mb-2">
            <div class="font-bold text-sm truncate">${track.title}</div>
            <div class="text-xs text-gray-400 truncate">${track.artist.name}</div>
        `;
                card.onclick = () => playTrack(track);
                resultsContainer.appendChild(card);
            });
        }

        // 3. Lecture de la musique
        function playTrack(track) {
            audio.src = track.preview; // Extrait de 30s
            audio.play();

            isPlaying = true;
            playBtn.innerHTML = '<i class="fa fa-pause"></i>';

            // Mise à jour de l'interface du lecteur
            currentCover.src = track.album.cover_medium;
            currentTitle.innerText = track.title;
            currentArtist.innerText = track.artist.name;
        }

        // Bouton Play/Pause
        playBtn.onclick = () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = '<i class="fa fa-play"></i>';
            } else {
                if (audio.src) {
                    audio.play();
                    playBtn.innerHTML = '<i class="fa fa-pause"></i>';
                }
            }
            isPlaying = !isPlaying;
        };
    </script>
</body>

</html>
